<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouBook - Riprendi configurazione Stripe</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --surface: #ffffff;
      --text: #152033;
      --muted: #61708a;
      --brand: #4f46e5;
      --border: #d9e1ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 50px rgba(21, 32, 51, 0.08);
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #eef2ff;
      color: var(--brand);
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }

    h1 {
      margin: 22px 0 10px;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    a.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">Y</div>
    <h1>Configurazione Stripe da completare</h1>
    <p>Il link di onboarding potrebbe essere scaduto oppure la procedura non e' stata terminata. Torna a YouBook e genera un nuovo link dalla scheda Stripe del salone.</p>
    <div class="actions">
      <a class="primary" href="/">Apri YouBook</a>
      <a href="/stripe-success">Vai alla conferma</a>
    </div>
  </main>
</body>
</html>
